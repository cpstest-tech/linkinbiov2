<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Link in bio di cpstest_ - Scopri i miei contenuti su tech, PC building e molto altro!">
    <meta property="og:title" content="cpstest_ - Link in Bio">
    <meta property="og:description" content="Link in bio con effetti liquid glass moderni">
    <meta property="og:type" content="website">
    <title>cpstest_ - Link in Bio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
</head>

<body>
    <div class="site">
        <!-- Profile Card -->
        <div class="profile-card">
            <div class="memoji"><img src="foto/memoji.png" alt="Profile"></div>
            <h1 class="handle">cpstest_</h1>
            <p class="line">Ciao, sono Paolo 🇮🇹</p>
            <p class="line">Parlo di 🎮 e 💻</p>

            <ul class="socials">
                <li><a href="#" class="social" data-social="tiktok"><i class="fab fa-tiktok"></i></a></li>
                <li><a href="#" class="social" data-social="youtube"><i class="fab fa-youtube"></i></a></li>
                <li><a href="#" class="social" data-social="instagram"><i class="fab fa-instagram"></i></a></li>
                <li><a href="#" class="social" data-social="telegram"><i class="fab fa-telegram"></i></a></li>
                <li><a href="#" class="social" data-social="discord"><i class="fab fa-discord"></i></a></li>
            </ul>
        </div>

        <!-- Links (E.g. Sito Build PC) -->
        <div class="links">
            <!-- Links will be generated by script.js -->
        </div>

        <!-- Section Title for Sponsors -->
        <div class="section-header">
            <h3><i class="fas fa-gem"></i> I miei Sponsor</h3>
        </div>

        <!-- Sponsors Carousel -->
        <div class="sponsors-carousel">
            <!-- Carousel will be generated by script.js -->
        </div>
        
        <button class="sponsors-all-btn" id="open-sponsors-sheet">
            <i class="fas fa-list"></i> Scopri tutti gli Sponsor
        </button>

        <!-- Sponsors Bottom Sheet -->
        <div class="bottom-sheet-overlay" id="sponsors-overlay"></div>
        <div class="bottom-sheet" id="sponsors-sheet">
            <div class="sheet-header">
                <h3>I miei Sponsor</h3>
                <button class="close-sheet" id="close-sponsors-sheet"><i class="fas fa-times"></i></button>
            </div>
            <div class="sheet-content">
                <!-- Generated by script.js -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
